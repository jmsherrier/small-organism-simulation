# ── Prochlorococcus Cellular Simulation Configuration ──────────────────────
#
# This file configures the simulation run. All values shown are defaults.
# Override at runtime: java -jar app.jar --config /path/to/this/file

# ── Simulation durations ────────────────────────────────────────────────────
# How many hours to run each organism's simulation
sim.med4.duration.hours=24
sim.ecoli.duration.hours=12
sim.yeast.duration.hours=24

# ── Paths ───────────────────────────────────────────────────────────────────
# Directory for cached GenBank flat files (created on first run)
sim.data.dir=genbank_data

# Directory for CSV/JSON output files (created automatically)
sim.output.dir=output

# ── Output verbosity ────────────────────────────────────────────────────────
# quiet   → summary statistics only
# normal  → time-series table + summary (default)
# verbose → full output including raw time-series data
sim.output.verbosity=normal
